name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Format and Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Check version consistency
        run: ./scripts/bump-version.sh --check

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@v1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: nightly-2026-04-02
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        # Swatinem/rust-cache@v2
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          cache-bin: false

      - name: Install flatc
        uses: ./.github/actions/setup-flatc
        with:
          version: "25.2.10"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Check documentation
        run: cargo doc --workspace --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@v1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: nightly-2026-04-02

      - name: Cache Rust build artifacts
        # Swatinem/rust-cache@v2
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          cache-bin: false

      - name: Install flatc
        uses: ./.github/actions/setup-flatc
        with:
          version: "25.2.10"

      - name: Run tests
        run: cargo test --workspace --all-features --locked

  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: flutter/triage_client

    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Flutter
        # subosito/flutter-action@v2 (matches publish.yml)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # The client carries a large pre-existing analyzer backlog (mostly the
      # generated FlatBuffers bindings), so gate on error-severity only: genuine
      # breakage fails the build without drowning in the existing info/warning
      # noise. Tightening this (excluding generated files, clearing the backlog,
      # then making warnings fatal) is a worthwhile follow-up.
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    # Headroom for a cold first build (Gradle dist + deps + any SDK/NDK pull)
    # before the Gradle cache is populated from the default branch.
    timeout-minutes: 45
    defaults:
      run:
        working-directory: flutter/triage_client

    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up JDK
        # actions/setup-java@v4
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          # Matches sourceCompatibility/jvmTarget in android/app/build.gradle.kts.
          java-version: "17"

      - name: Set up Flutter
        # subosito/flutter-action@v2 (matches publish.yml). cache: true caches
        # both the Flutter SDK and the pub package cache (~/.pub-cache).
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: "stable"
          cache: true

      # Caches the Gradle user home (dependencies + wrapper dists + build cache)
      # for the Gradle that `flutter build apk` shells out to. By default it only
      # writes the cache from the default branch, so PRs restore but don't
      # pollute it — main's CI run populates it after this merges.
      - name: Set up Gradle cache
        # gradle/actions/setup-gradle@v6.2.0
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Install dependencies
        run: flutter pub get

      # A release build, but signed with the debug keystore (see the release
      # signingConfig in android/app/build.gradle.kts), so the artifact installs
      # directly on any device without release-signing secrets. One universal
      # APK — download a single file from the run summary and sideload it.
      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        # actions/upload-artifact@v6 (matches publish.yml)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: triage-client-apk
          # Path is relative to the workspace root, not the job working-directory.
          path: flutter/triage_client/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
