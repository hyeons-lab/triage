name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (verify packaging without uploading)'
        type: boolean
        required: true
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Build Client & Publish Crates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Determine workspace version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "triaged") | .version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Could not determine workspace version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Workspace version: $VERSION"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install flatc
        uses: Nugine/setup-flatc@v1
        with:
          version: "25.2.10"

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      # Step 1: Upgrade & Build Flutter Web Client
      - name: Build Flutter Web Client
        run: |
          cd flutter/triage_client
          flutter pub get
          flutter build web --release

      # Step 2: Stage assets inside triaged daemon crate dist/ directory
      - name: Stage Web Assets in triaged Crate
        run: |
          mkdir -p crates/triaged/dist
          cp -r flutter/triage_client/build/web/* crates/triaged/dist/

      # Step 3: Run Crate Dry-runs / Checks
      - name: Verify Workspace Compiles with Staged Assets
        run: cargo check --workspace --locked

      # Step 4: Publish in strict topological order with index propagation delay
      - name: Publish Crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "=== RUNNING IN DRY-RUN MODE ==="

            echo "Packaging triage-core..."
            cargo package -p triage-core --allow-dirty

            # Downstream crates depend on internal versions that may not exist on crates.io yet.
            # `cargo check --workspace --locked` already verifies the workspace with local path deps.
            echo "Packaging triage-transport-ws..."
            cargo package -p triage-transport-ws --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'"

            echo "Packaging triaged..."
            cargo package -p triaged --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'" \
              --config "patch.crates-io.triage-transport-ws.path='crates/triage-transport-ws'"

            echo "Packaging triage-mcp..."
            cargo package -p triage-mcp --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'" \
              --config "patch.crates-io.triage-transport-ws.path='crates/triage-transport-ws'" \
              --config "patch.crates-io.triaged.path='crates/triaged'"

            echo "Packaging triage..."
            cargo package -p triage --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'" \
              --config "patch.crates-io.triage-transport-ws.path='crates/triage-transport-ws'" \
              --config "patch.crates-io.triaged.path='crates/triaged'"

            echo "All crates packaged successfully."
            exit 0
          else
            echo "=== PUBLISHING TO CRATES.IO ==="
          fi

          echo "Publishing triage-core..."
          cargo publish -p triage-core --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triage-transport-ws..."
          cargo publish -p triage-transport-ws --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triaged..."
          cargo publish -p triaged --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triage-mcp..."
          cargo publish -p triage-mcp --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triage..."
          cargo publish -p triage --allow-dirty

          echo "All crates published successfully."

  release:
    name: Tag & GitHub Release (macOS App)
    # Only on a real publish, and only if the crates published successfully.
    needs: publish
    if: ${{ github.event.inputs.dry_run == 'false' }}
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      # Build the macOS Triage Flutter desktop client (ad-hoc signed; the
      # project uses CODE_SIGN_IDENTITY = "-", so no signing secrets are needed).
      - name: Build macOS Triage.app
        run: |
          cd flutter/triage_client
          flutter pub get
          flutter build macos --release

      # A .app is a bundle (directory); ditto produces a release-attachable zip
      # that preserves bundle structure and macOS metadata.
      - name: Package Triage.app
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          cd flutter/triage_client/build/macos/Build/Products/Release
          ditto -c -k --keepParent Triage.app \
            "$GITHUB_WORKSPACE/Triage-macos-v${VERSION}.zip"

      - name: Create tag and GitHub release with the macOS app
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.publish.outputs.version }}
          name: v${{ needs.publish.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: Triage-macos-v${{ needs.publish.outputs.version }}.zip
