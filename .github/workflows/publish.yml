name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (verify packaging without uploading)'
        type: boolean
        required: true
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Build Client & Publish Crates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust toolchain
        # Nightly required by the `cera` dep on aarch64 (see rust-toolchain.toml).
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-04-02

      - name: Determine workspace version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --locked --format-version 1 \
            | jq -r '.packages[] | select(.name == "triaged") | .version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Could not determine workspace version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Workspace version: $VERSION"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install flatc
        uses: ./.github/actions/setup-flatc
        with:
          version: "25.2.10"

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      # Step 1: Upgrade & Build Flutter Web Client
      - name: Build Flutter Web Client
        run: |
          cd flutter/triage_client
          flutter pub get
          flutter build web --release

      # Step 2: Stage assets inside triaged daemon crate dist/ directory
      - name: Stage Web Assets in triaged Crate
        run: |
          mkdir -p crates/triaged/dist
          cp -r flutter/triage_client/build/web/* crates/triaged/dist/

      # Share the built web assets with the build-cli jobs so the released
      # `triaged` binary embeds the same web UI without rebuilding Flutter on
      # each runner.
      - name: Upload Web Assets artifact
        # actions/upload-artifact@v6
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: web-assets
          path: crates/triaged/dist
          if-no-files-found: error

      # Step 3: Run Crate Dry-runs / Checks
      - name: Verify Workspace Compiles with Staged Assets
        run: cargo check --workspace --locked

      # Step 4: Publish in strict topological order with index propagation delay
      - name: Publish Crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "=== RUNNING IN DRY-RUN MODE ==="

            echo "Packaging triage-core..."
            cargo package -p triage-core --allow-dirty

            # Downstream crates depend on internal versions that may not exist on crates.io yet.
            # `cargo check --workspace --locked` already verifies the workspace with local path deps.
            echo "Packaging triage-transport-ws..."
            cargo package -p triage-transport-ws --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'"

            echo "Packaging triaged..."
            cargo package -p triaged --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'" \
              --config "patch.crates-io.triage-transport-ws.path='crates/triage-transport-ws'"

            echo "Packaging triage-mcp..."
            cargo package -p triage-mcp --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'" \
              --config "patch.crates-io.triage-transport-ws.path='crates/triage-transport-ws'" \
              --config "patch.crates-io.triaged.path='crates/triaged'"

            echo "Packaging triage..."
            cargo package -p triage --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'" \
              --config "patch.crates-io.triage-transport-ws.path='crates/triage-transport-ws'" \
              --config "patch.crates-io.triaged.path='crates/triaged'"

            echo "All crates packaged successfully."
            exit 0
          else
            echo "=== PUBLISHING TO CRATES.IO ==="
          fi

          echo "Publishing triage-core..."
          cargo publish -p triage-core --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triage-transport-ws..."
          cargo publish -p triage-transport-ws --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triaged..."
          cargo publish -p triaged --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triage-mcp..."
          cargo publish -p triage-mcp --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triage..."
          cargo publish -p triage --allow-dirty

          echo "All crates published successfully."

  # Each desktop client is built on its native runner, packaged, and uploaded as
  # a workflow artifact; the `release` job then attaches all three to one release.
  # All three gate on a successful crate publish (needs: publish) and skip on dry
  # runs, so no client is built and no release is cut unless the publish succeeded.

  build-macos:
    name: Build macOS client
    needs: publish
    if: ${{ github.event.inputs.dry_run == 'false' }}
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      # Flutter itself signs with CODE_SIGN_IDENTITY = "-" (ad-hoc); the Developer ID
      # signature is applied afterwards when signing secrets are configured (below).
      - name: Build Triage.app
        run: |
          cd flutter/triage_client
          flutter pub get
          flutter build macos --release

      # Developer ID signing + notarization runs only when the signing secrets are
      # configured. Without them the job falls back to the prior ad-hoc re-sign so
      # forks / unconfigured repos still produce a release (just not a notarized one).
      - name: Check for signing secrets
        id: signing
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          # The signed/notarized path needs ALL six secrets. Gating on the full
          # set (not just the identity) means a partially configured repo falls
          # back to ad-hoc cleanly instead of entering the signed path and failing
          # mid-job when a cert or notary key turns up missing.
          missing=""
          for var in MACOS_CERT_P12_BASE64 MACOS_CERT_PASSWORD MACOS_SIGN_IDENTITY \
                     MACOS_NOTARY_KEY_BASE64 MACOS_NOTARY_KEY_ID MACOS_NOTARY_ISSUER_ID; do
            if [ -z "${!var:-}" ]; then
              missing="$missing $var"
            fi
          done
          if [ -z "$missing" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Developer ID signing secrets not fully set (missing:$missing); the macOS client will be ad-hoc signed and not notarized."
          fi

      # Import the Developer ID Application cert into an ephemeral, per-job keychain
      # (auto-discarded when the runner is torn down) so codesign/notarytool can find
      # the identity without touching the runner's login keychain.
      - name: Import Developer ID certificate
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          # -D (not --decode) is the decode flag the macOS/BSD base64 accepts on
          # every runner image; GNU-style long options are not guaranteed there.
          echo "$MACOS_CERT_P12_BASE64" | base64 -D > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # Allow codesign to use the private key non-interactively.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          # Prepend our signing keychain to the search list, preserving the runner's
          # existing keychains so the Apple intermediate certificates needed to build
          # the signing chain stay resolvable. Word-splitting the existing list into
          # separate arguments is intentional (runner keychain paths have no spaces).
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT_PATH"

      # Sign nested Flutter frameworks/dylibs inside-out, then the app bundle, all
      # with the hardened runtime + secure timestamp Apple requires for notarization.
      # Signing with a real Developer ID identity means Xcode does not inject the
      # debug get-task-allow entitlement, so the notarized app is not debuggable and
      # macOS persists "Always Allow" Keychain decisions (fixing the repeated prompts
      # the old ad-hoc build had). Uses the sandbox Release entitlements.
      - name: Sign with Developer ID (hardened runtime)
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          cd flutter/triage_client
          APP=build/macos/Build/Products/Release/Triage.app
          # Notarization requires the hardened runtime on *every* Mach-O in the
          # bundle, which `codesign --deep` does not reliably apply to nested code.
          # Sign inside-out — loose dylibs/shared objects first, then framework
          # bundles, then the app — each with the hardened runtime + secure timestamp.
          while IFS= read -r -d '' lib; do
            codesign --force --options runtime --timestamp \
              --sign "$MACOS_SIGN_IDENTITY" "$lib"
          done < <(find "$APP/Contents/Frameworks" -type f \
            \( -name '*.dylib' -o -name '*.so' \) -print0 2>/dev/null)
          while IFS= read -r -d '' fw; do
            codesign --force --options runtime --timestamp \
              --sign "$MACOS_SIGN_IDENTITY" "$fw"
          done < <(find "$APP/Contents/Frameworks" -type d -name '*.framework' -print0 2>/dev/null)
          codesign --force --options runtime --timestamp \
            --entitlements macos/Runner/Release.entitlements \
            --sign "$MACOS_SIGN_IDENTITY" "$APP"
          codesign --verify --strict --verbose=2 "$APP"
          # Fail closed if the debug entitlement is somehow present.
          if codesign -d --entitlements - "$APP" 2>/dev/null | grep -q 'get-task-allow'; then
            echo "::error::get-task-allow present after Developer ID signing" >&2
            exit 1
          fi

      # Submit to Apple's notary service and staple the resulting ticket into the app
      # so Gatekeeper verifies it offline (no first-launch network round-trip). Uses
      # an App Store Connect API key (.p8) rather than an Apple ID + password.
      - name: Notarize and staple
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        env:
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          cd flutter/triage_client
          APP=build/macos/Build/Products/Release/Triage.app
          KEY_PATH="$RUNNER_TEMP/notary_key.p8"
          NOTARIZE_ZIP="$RUNNER_TEMP/Triage-notarize.zip"
          echo "$MACOS_NOTARY_KEY_BASE64" | base64 -D > "$KEY_PATH"
          # notarytool submits an archive; a ditto zip of the .app is accepted.
          ditto -c -k --keepParent "$APP" "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --key "$KEY_PATH" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          rm -f "$KEY_PATH" "$NOTARIZE_ZIP"

      # Fallback path only: when no Developer ID is configured, `flutter build macos`
      # ad-hoc signs and Xcode injects `com.apple.security.get-task-allow` (a debug
      # entitlement). macOS will not persist an "Always Allow" Keychain decision for a
      # debuggable app, so flutter_secure_storage re-prompts on every launch. Re-sign
      # ad-hoc with the Release entitlements (which omit get-task-allow) to stop that.
      - name: Strip get-task-allow (ad-hoc fallback)
        if: ${{ steps.signing.outputs.enabled == 'false' }}
        run: |
          cd flutter/triage_client
          APP=build/macos/Build/Products/Release/Triage.app
          codesign --force --deep --sign - \
            --entitlements macos/Runner/Release.entitlements "$APP"
          # Fail the build if the debug entitlement survived the re-sign.
          if codesign -d --entitlements - "$APP" 2>/dev/null | grep -q 'get-task-allow'; then
            echo "::error::get-task-allow still present after re-sign" >&2
            exit 1
          fi
          codesign --verify --strict "$APP"

      # A .app is a bundle (directory); ditto produces a release-attachable zip
      # that preserves bundle structure and macOS metadata.
      - name: Package Triage.app
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          cd flutter/triage_client/build/macos/Build/Products/Release
          ditto -c -k --keepParent Triage.app \
            "$GITHUB_WORKSPACE/Triage-macos-v${VERSION}.zip"

      - name: Upload macOS artifact
        # actions/upload-artifact@v6
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: client-macos
          path: Triage-macos-v${{ needs.publish.outputs.version }}.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows client
    needs: publish
    if: ${{ github.event.inputs.dry_run == 'false' }}
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Build Windows client
        run: |
          cd flutter/triage_client
          flutter pub get
          flutter build windows --release

      # Zip the Release output directory (exe + DLLs + data/).
      - name: Package Windows client
        shell: pwsh
        run: |
          $version = "${{ needs.publish.outputs.version }}"
          Compress-Archive -Path flutter/triage_client/build/windows/x64/runner/Release/* `
            -DestinationPath "Triage-windows-v$version.zip"

      - name: Upload Windows artifact
        # actions/upload-artifact@v6
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: client-windows
          path: Triage-windows-v${{ needs.publish.outputs.version }}.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux client
    needs: publish
    if: ${{ github.event.inputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # Linux desktop toolchain + native plugin deps:
      # flutter_secure_storage_linux needs libsecret + jsoncpp.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libsecret-1-dev libjsoncpp-dev

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Build Linux client
        run: |
          cd flutter/triage_client
          flutter pub get
          flutter build linux --release

      # Tar the bundle directory (executable + lib/ + data/).
      - name: Package Linux client
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          tar -czf "Triage-linux-v${VERSION}.tar.gz" \
            -C flutter/triage_client/build/linux/x64/release/bundle .

      - name: Upload Linux artifact
        # actions/upload-artifact@v6
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: client-linux
          path: Triage-linux-v${{ needs.publish.outputs.version }}.tar.gz
          if-no-files-found: error

  # Build the prebuilt CLI binaries (triaged daemon, triage TUI, triage-mcp) on
  # each native runner so users can self-update / install without compiling.
  # Same gating as the client builds: only after a successful publish, skipped on
  # dry runs. The build itself mirrors what ci.yml already runs on all three OSes.
  build-cli:
    name: Build CLI binaries (${{ matrix.label }})
    needs: publish
    if: ${{ github.event.inputs.dry_run == 'false' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
            ext: tar.gz
          - os: windows-latest
            label: windows
            ext: zip
          - os: ubuntu-latest
            label: linux
            ext: tar.gz
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@v1 (SHA-pinned to match ci.yml). Nightly is
        # required by the `cera` dep on aarch64 (see rust-toolchain.toml).
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: nightly-2026-04-02

      - name: Cache Rust build artifacts
        # Swatinem/rust-cache@v2 (SHA-pinned to match ci.yml).
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          cache-bin: false

      - name: Install flatc
        uses: ./.github/actions/setup-flatc
        with:
          version: "25.2.10"

      # Embed the same web UI the published daemon serves, built once by the
      # publish job, so we don't rebuild Flutter on three runners.
      - name: Download Web Assets
        # actions/download-artifact@v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: web-assets
          path: crates/triaged/dist

      - name: Build release binaries
        run: cargo build --release --locked -p triaged -p triage -p triage-mcp

      - name: Package binaries (tar.gz)
        if: ${{ matrix.ext == 'tar.gz' }}
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          tar -czf "Triage-cli-${{ matrix.label }}-v${VERSION}.tar.gz" \
            -C target/release triaged triage triage-mcp

      - name: Package binaries (zip)
        if: ${{ matrix.ext == 'zip' }}
        shell: pwsh
        run: |
          $version = "${{ needs.publish.outputs.version }}"
          Compress-Archive `
            -Path target/release/triaged.exe, target/release/triage.exe, target/release/triage-mcp.exe `
            -DestinationPath "Triage-cli-windows-v$version.zip"

      - name: Upload CLI artifact
        # actions/upload-artifact@v6
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: cli-${{ matrix.label }}
          path: Triage-cli-${{ matrix.label }}-v${{ needs.publish.outputs.version }}.${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Tag & GitHub Release (clients + CLI binaries)
    needs: [publish, build-macos, build-windows, build-linux, build-cli]
    if: ${{ github.event.inputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Least privilege: only this job needs write access to create the tag/release.
    permissions:
      contents: write
    steps:
      - name: Download client + CLI artifacts
        # actions/download-artifact@v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          # Only the release archives: client-* and cli-* (both start "cl").
          # Skips the web-assets bundle the build-cli jobs already consumed.
          pattern: cl*
          path: release-assets

      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign

      # Sign and checksum every release archive so clients can verify downloads
      # before installing them (self-update, in-app install). minisign uses the
      # ed25519 key whose public half is committed at .github/minisign.pub; the
      # private half lives only in the MINISIGN_SECRET_KEY secret. Fails closed:
      # if the secret is missing, no release is cut rather than shipping unsigned
      # binaries.
      - name: Sign and checksum release assets
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set; refusing to publish unsigned binaries" >&2
            exit 1
          fi

          # Materialize the passwordless secret key for this job only.
          keyfile="$(mktemp)"
          trap 'rm -f "$keyfile"' EXIT
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$keyfile"

          # Sign + checksum each archive, skipping any already-generated sidecars.
          find release-assets -type f -name 'Triage-*' \
            ! -name '*.minisig' ! -name '*.sha256' -print0 |
          while IFS= read -r -d '' asset; do
            echo "Signing $asset"
            dir="$(dirname "$asset")"
            base="$(basename "$asset")"
            # `.sha256` holds "<hash>  <basename>" so `sha256sum -c` works in-place.
            ( cd "$dir" && sha256sum "$base" > "$base.sha256" )
            minisign -S -s "$keyfile" -m "$asset" \
              -t "triage release v$VERSION" -c "triage release v$VERSION" < /dev/null
          done

          echo "=== generated signatures + checksums ==="
          find release-assets -type f \( -name '*.minisig' -o -name '*.sha256' \) -print | sort

      - name: Create tag and GitHub release with all clients
        # softprops/action-gh-release@v3
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: v${{ needs.publish.outputs.version }}
          name: v${{ needs.publish.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # The `.minisig`/`.sha256` sidecars also start with "Triage-", so the
          # same glob attaches them alongside each archive.
          files: release-assets/**/Triage-*
