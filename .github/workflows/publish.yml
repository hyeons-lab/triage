name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (verify packaging without uploading)'
        type: boolean
        required: true
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Build Client & Publish Crates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Determine workspace version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --locked --format-version 1 \
            | jq -r '.packages[] | select(.name == "triaged") | .version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Could not determine workspace version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Workspace version: $VERSION"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Install flatc
        uses: ./.github/actions/setup-flatc
        with:
          version: "25.2.10"

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      # Step 1: Upgrade & Build Flutter Web Client
      - name: Build Flutter Web Client
        run: |
          cd flutter/triage_client
          flutter pub get
          flutter build web --release

      # Step 2: Stage assets inside triaged daemon crate dist/ directory
      - name: Stage Web Assets in triaged Crate
        run: |
          mkdir -p crates/triaged/dist
          cp -r flutter/triage_client/build/web/* crates/triaged/dist/

      # Step 3: Run Crate Dry-runs / Checks
      - name: Verify Workspace Compiles with Staged Assets
        run: cargo check --workspace --locked

      # Step 4: Publish in strict topological order with index propagation delay
      - name: Publish Crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "=== RUNNING IN DRY-RUN MODE ==="

            echo "Packaging triage-core..."
            cargo package -p triage-core --allow-dirty

            # Downstream crates depend on internal versions that may not exist on crates.io yet.
            # `cargo check --workspace --locked` already verifies the workspace with local path deps.
            echo "Packaging triage-transport-ws..."
            cargo package -p triage-transport-ws --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'"

            echo "Packaging triaged..."
            cargo package -p triaged --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'" \
              --config "patch.crates-io.triage-transport-ws.path='crates/triage-transport-ws'"

            echo "Packaging triage-mcp..."
            cargo package -p triage-mcp --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'" \
              --config "patch.crates-io.triage-transport-ws.path='crates/triage-transport-ws'" \
              --config "patch.crates-io.triaged.path='crates/triaged'"

            echo "Packaging triage..."
            cargo package -p triage --allow-dirty --no-verify \
              --config "patch.crates-io.triage-core.path='crates/triage-core'" \
              --config "patch.crates-io.triage-transport-ws.path='crates/triage-transport-ws'" \
              --config "patch.crates-io.triaged.path='crates/triaged'"

            echo "All crates packaged successfully."
            exit 0
          else
            echo "=== PUBLISHING TO CRATES.IO ==="
          fi

          echo "Publishing triage-core..."
          cargo publish -p triage-core --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triage-transport-ws..."
          cargo publish -p triage-transport-ws --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triaged..."
          cargo publish -p triaged --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triage-mcp..."
          cargo publish -p triage-mcp --allow-dirty
          
          echo "Waiting for crates.io index propagation..."
          sleep 20

          echo "Publishing triage..."
          cargo publish -p triage --allow-dirty

          echo "All crates published successfully."

  # Each desktop client is built on its native runner, packaged, and uploaded as
  # a workflow artifact; the `release` job then attaches all three to one release.
  # All three gate on a successful crate publish (needs: publish) and skip on dry
  # runs, so no client is built and no release is cut unless the publish succeeded.

  build-macos:
    name: Build macOS client
    needs: publish
    if: ${{ github.event.inputs.dry_run == 'false' }}
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      # Ad-hoc signed (the project uses CODE_SIGN_IDENTITY = "-"), so no signing
      # secrets are required.
      - name: Build Triage.app
        run: |
          cd flutter/triage_client
          flutter pub get
          flutter build macos --release

      # The runner has no Developer ID, so `flutter build macos --release` falls
      # back to ad-hoc signing and Xcode injects `com.apple.security.get-task-allow`
      # (a debug entitlement) into the app. macOS will not persist an "Always Allow"
      # Keychain decision for a debuggable app, so flutter_secure_storage re-prompts
      # the user on every launch. Re-sign with the Release entitlements (which omit
      # get-task-allow) to stop the repeated Keychain prompts. The app stays ad-hoc
      # signed (users clear quarantine on first launch) but is no longer debuggable.
      - name: Strip get-task-allow (fix repeated Keychain prompts)
        run: |
          cd flutter/triage_client
          APP=build/macos/Build/Products/Release/Triage.app
          codesign --force --deep --sign - \
            --entitlements macos/Runner/Release.entitlements "$APP"
          # Fail the build if the debug entitlement survived the re-sign.
          if codesign -d --entitlements - "$APP" 2>/dev/null | grep -q 'get-task-allow'; then
            echo "::error::get-task-allow still present after re-sign" >&2
            exit 1
          fi
          codesign --verify --strict "$APP"

      # A .app is a bundle (directory); ditto produces a release-attachable zip
      # that preserves bundle structure and macOS metadata.
      - name: Package Triage.app
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          cd flutter/triage_client/build/macos/Build/Products/Release
          ditto -c -k --keepParent Triage.app \
            "$GITHUB_WORKSPACE/Triage-macos-v${VERSION}.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-macos
          path: Triage-macos-v${{ needs.publish.outputs.version }}.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows client
    needs: publish
    if: ${{ github.event.inputs.dry_run == 'false' }}
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Build Windows client
        run: |
          cd flutter/triage_client
          flutter pub get
          flutter build windows --release

      # Zip the Release output directory (exe + DLLs + data/).
      - name: Package Windows client
        shell: pwsh
        run: |
          $version = "${{ needs.publish.outputs.version }}"
          Compress-Archive -Path flutter/triage_client/build/windows/x64/runner/Release/* `
            -DestinationPath "Triage-windows-v$version.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: Triage-windows-v${{ needs.publish.outputs.version }}.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux client
    needs: publish
    if: ${{ github.event.inputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux desktop toolchain + native plugin deps:
      # flutter_secure_storage_linux needs libsecret + jsoncpp.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libsecret-1-dev libjsoncpp-dev

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Build Linux client
        run: |
          cd flutter/triage_client
          flutter pub get
          flutter build linux --release

      # Tar the bundle directory (executable + lib/ + data/).
      - name: Package Linux client
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          tar -czf "Triage-linux-v${VERSION}.tar.gz" \
            -C flutter/triage_client/build/linux/x64/release/bundle .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-linux
          path: Triage-linux-v${{ needs.publish.outputs.version }}.tar.gz
          if-no-files-found: error

  release:
    name: Tag & GitHub Release (all clients)
    needs: [publish, build-macos, build-windows, build-linux]
    if: ${{ github.event.inputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Least privilege: only this job needs write access to create the tag/release.
    permissions:
      contents: write
    steps:
      - name: Download client artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create tag and GitHub release with all clients
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.publish.outputs.version }}
          name: v${{ needs.publish.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/**/Triage-*
