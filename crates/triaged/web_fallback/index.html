<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Triage Web Client</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 12px;
            background: #252538;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }
        h1 {
            color: #f38ba8;
            margin-bottom: 1rem;
        }
        p {
            line-height: 1.5;
            color: #a6adc8;
        }
        code {
            background: #181825;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            color: #f9e2af;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flutter Client Not Built</h1>
        <p>The Triage web client assets were not found at compilation time.</p>
        <p>Please build the Flutter client by running:</p>
        <p><code>cd flutter/triage_client && flutter build web</code></p>
        <p>Alternatively, you can dynamically install/upgrade the client at runtime by running:</p>
        <p><code>triage client upgrade</code></p>
    </div>
</body>
</html>
